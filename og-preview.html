<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Shippori+Mincho+B1:wght@400..800&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #F1ECE0;
      --paper-deep: #E6DDC9;
      --ink: #17130F;
      --ink-muted: #5C5247;
      --accent: #8B2514;
      --gold: #C9A14A;
      --brass: #B18B4E;
      --line: rgba(23,19,15,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px; height: 630px;
      background: var(--paper);
      font-family: "Bricolage Grotesque", sans-serif;
      color: var(--ink);
      overflow: hidden;
      position: relative;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(139, 37, 20, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(177, 139, 78, 0.08) 0%, transparent 55%);
    }
    .wrap {
      width: 100%; height: 100%;
      padding: 56px 72px;
      display: grid;
      grid-template-columns: 1fr 440px;
      gap: 60px;
      position: relative;
    }
    .left { display: flex; flex-direction: column; justify-content: space-between; }
    .top-meta {
      display: flex; align-items: center; gap: 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-muted);
    }
    .hairline { flex: 1; max-width: 100px; height: 1px; background: var(--line); }

    .title {
      font-weight: 700;
      font-variation-settings: "opsz" 96, "wdth" 85;
      letter-spacing: -0.035em;
      line-height: 0.86;
    }
    .title .l1 { font-size: 108px; color: var(--ink); }
    .title .l2 { font-size: 144px; color: var(--accent); font-style: italic; font-variation-settings: "opsz" 96, "wdth" 75, "wght" 800; display: block; margin-top: -8px; }
    .subtitle {
      font-family: "Shippori Mincho B1", serif;
      font-size: 24px;
      letter-spacing: 0.1em;
      color: var(--ink);
      margin-top: 18px;
    }
    .subtitle em { color: var(--accent); font-style: italic; }

    .footer {
      display: flex; justify-content: space-between; align-items: flex-end;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }
    .foot-block { display: flex; flex-direction: column; gap: 4px; }
    .foot-label { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.22em; color: var(--ink-muted); text-transform: uppercase; }
    .foot-value { font-size: 20px; font-weight: 700; font-variation-settings: "opsz" 36, "wdth" 85; }
    .foot-value em { color: var(--accent); font-style: italic; }

    /* Pyramid */
    .pyramid {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding-top: 12px;
    }
    .tier {
      padding: 10px 16px;
      border: 1px solid var(--ink);
      background: var(--paper);
      display: flex; align-items: baseline; justify-content: center; gap: 10px;
      color: var(--ink);
    }
    .tier .num {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700; font-style: italic; color: var(--accent);
      font-variation-settings: "opsz" 36, "wdth" 85;
      font-size: 16px; min-width: 32px; text-align: right;
    }
    .tier .name {
      font-weight: 700; font-size: 12px; letter-spacing: 0.08em;
      font-variation-settings: "opsz" 24, "wdth" 85;
    }
    .tier.top { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .tier.top .num { color: #D1B680; }
    .tier.gold { background: rgba(201,161,74,0.1); border-color: var(--gold); }

    .tier[data-rank="9"] { width: 30%; }
    .tier[data-rank="8"] { width: 38%; }
    .tier[data-rank="7"] { width: 46%; }
    .tier[data-rank="6"] { width: 54%; }
    .tier[data-rank="5"] { width: 62%; }
    .tier[data-rank="4"] { width: 70%; }
    .tier[data-rank="3"] { width: 78%; }
    .tier[data-rank="2"] { width: 86%; }
    .tier[data-rank="1"] { width: 100%; }

    .badge {
      position: absolute;
      bottom: 32px; right: 72px;
      padding: 6px 12px;
      border: 1px solid var(--accent);
      background: rgba(139,37,20,0.04);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px; letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="top-meta">
        <span>AN OFFICIAL CLASSIFICATION</span>
        <span class="hairline"></span>
      </div>

      <div>
        <h1 class="title">
          <span class="l1">THE</span>
          <span class="l2">AI RANK</span>
        </h1>
        <p class="subtitle">— <em>AI 格付けランク</em> · 9 Levels · by CHAEN —</p>
      </div>

      <div class="footer">
        <div class="foot-block">
          <span class="foot-label">Levels</span>
          <span class="foot-value">I <em>→</em> IX</span>
        </div>
        <div class="foot-block">
          <span class="foot-label">Start</span>
          <span class="foot-value">ai-rank.org</span>
        </div>
        <div class="foot-block">
          <span class="foot-label">Edition</span>
          <span class="foot-value">MMXXVI</span>
        </div>
      </div>
    </div>

    <div class="pyramid">
      <div class="tier top" data-rank="9"><span class="num">IX</span><span class="name">SINGULARIAN</span></div>
      <div class="tier gold" data-rank="8"><span class="num">VIII</span><span class="name">AI ALCHEMIST</span></div>
      <div class="tier" data-rank="7"><span class="num">VII</span><span class="name">AGENT MASTER</span></div>
      <div class="tier" data-rank="6"><span class="num">VI</span><span class="name">AUTOMATOR</span></div>
      <div class="tier" data-rank="5"><span class="num">V</span><span class="name">VIBE CODER</span></div>
      <div class="tier" data-rank="4"><span class="num">IV</span><span class="name">ARTIFACTOR</span></div>
      <div class="tier" data-rank="3"><span class="num">III</span><span class="name">BOT BUILDER</span></div>
      <div class="tier" data-rank="2"><span class="num">II</span><span class="name">POWER USER</span></div>
      <div class="tier" data-rank="1"><span class="num">I</span><span class="name">BEGINNER</span></div>
    </div>
  </div>

  <div class="badge">◯ DIAGNOSE IN 2 MIN · FREE</div>
</body>
</html>
